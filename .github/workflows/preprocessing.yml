name: Preprocessing

# Re-run the automated preprocessing whenever the raw data or the
# preprocessing code changes (and on manual dispatch), then publish the
# refreshed processed dataset.
on:
  push:
    branches: [main]
    paths:
      - "heart-disease_raw.csv"
      - "preprocessing/automate_Raditya-Putra-Farma.py"
      - ".github/workflows/preprocessing.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Run automated preprocessing
        run: python preprocessing/automate_Raditya-Putra-Farma.py

      - name: Upload processed dataset artifact
        uses: actions/upload-artifact@v5
        with:
          name: heart-disease_preprocessing
          path: preprocessing/heart-disease_preprocessing.csv

      - name: Commit refreshed processed dataset
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preprocessing/heart-disease_preprocessing.csv
          if git diff --staged --quiet; then
            echo "No changes in the processed dataset."
          else
            git commit -m "chore: refresh processed dataset via CI"
            git push
          fi
